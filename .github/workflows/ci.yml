name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  repository_dispatch:
    types: [ upstream-updated ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Checkout parent POM
        uses: actions/checkout@v4
        with:
          repository: rspereiratech/openapi-generator-parent
          path: openapi-generator-parent
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install parent POM
        run: mvn install -f openapi-generator-parent/pom.xml -DskipTests

      - name: Build and test
        run: mvn verify

  trigger-downstream:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger plugin CI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: rspereiratech/openapi-generator-maven-plugin
          event-type: upstream-updated
