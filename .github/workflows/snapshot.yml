name: Publish SNAPSHOT

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy core SNAPSHOT
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify version is a SNAPSHOT
        run: |
          VERSION=$(mvn -q --settings ci-settings.xml help:evaluate \
            -Dexpression=project.version -DforceStdout)
          echo "Project version: $VERSION"
          if [[ "$VERSION" != *-SNAPSHOT ]]; then
            echo "::error::Refusing to deploy non-SNAPSHOT version '$VERSION' through this workflow."
            exit 1
          fi

      - name: Deploy SNAPSHOT
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        run: mvn -B -ntp --settings ci-settings.xml -DskipTests deploy
