name: Bug report
description: Report a defect in openapi-generator-core
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in the
        sections below so the issue can be reproduced and triaged quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer
      description: |
        Minimal input that triggers the bug — a controller class, POM snippet,
        plugin configuration, or other relevant source. Paste inline or link a gist.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to see in the generated OpenAPI spec / build output?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead? Include the relevant excerpt of the generated YAML/JSON or the build error.
      render: shell
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: Module version / commit
      description: Version of `openapi-generator-core` (or commit hash if built from source).
      placeholder: "1.3.0-SNAPSHOT @ abcdef0"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "e.g. 17.0.12 (Temurin)"
    validations:
      required: false

  - type: input
    id: maven-version
    attributes:
      label: Maven version
      placeholder: "e.g. 3.9.9"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: pre-flight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and could not find a duplicate.
          required: true
        - label: My report follows the [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
